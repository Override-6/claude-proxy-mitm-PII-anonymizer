      #      - ./proxy:/app/proxy:ro
      #      - ./scripts:/app/scripts:ro
      #    environment:
      #      - PYTHONUNBUFFERED=1
      #      - PYTHONPATH=.
      # HF_HOME points to the baked-in model cache (set at build time in Dockerfile)
      #      - HF_HOME=/app/hf_cache
      # Prevent any runtime network calls to HuggingFace — model is baked into image
      #      - TRANSFORMERS_OFFLINE=1
      #      - HF_DATASETS_OFFLINE=1
      # Schedule: run every Saturday at midnight
  #      - VALIDATOR_SCHEDULE_ENABLED=true
  #      - VALIDATOR_SCHEDULE_DAY=sat
  #      - VALIDATOR_SCHEDULE_HOUR=0
  #      - VALIDATOR_SCHEDULE_MINUTE=0
  #      - VALIDATOR_REQUEST_LIMIT=5000
  #    depends_on:
  #      - mitm-proxy

  mcp-servers:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - ./mcp.conf:/etc/nginx/conf.d/mcp.conf
    networks:
      - mcp
      - proxy

  google-workspace-mcp:
    build:
      context: .
      dockerfile: docker/gw-mcp.dockerfile
    image: claude-pii-proxy-google-workspace-mcp:latest
    container_name: google-workspace-mcp
    restart: unless-stopped
    networks:
      - mcp
    volumes:
      # Persists OAuth tokens across container restarts.
      - ./data/google-workspace-mcp:/app/tokens
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      # Must match exactly what you registered in Google Cloud Console.
      - GOOGLE_OAUTH_REDIRECT_URI=http://localhost:8000/oauth2callback
      # Required when running OAuth over plain HTTP (local dev / Docker).
      - OAUTHLIB_INSECURE_TRANSPORT=1
      - PYTHONUNBUFFERED=1

  

networks:
  mcp:
    driver: bridge
  proxy:
    driver: bridge
  vpn:
    driver: bridge