      #      - ~/.cache/pypoetry:/root/.cache/pypoetry:delegated
      # Note: HuggingFace models are baked into the image at /app/hf_cache —
      # we do NOT mount ~/.cache/huggingface here to avoid shadowing them.

      # === Application data ===
      # Shared entity cache (proxy writes, validator reads)
      #- ./data/requests-entities.jsonl:/app/data/requests-entities.jsonl:ro
      # Shared request log (read-only)
      #- ./data/requests-sample.jsonl:/app/data/requests-sample.jsonl:ro
      # Output: collected disagreements + training data
      # App data
      #      - ./data:/app/data
      # Fine-tuned models
