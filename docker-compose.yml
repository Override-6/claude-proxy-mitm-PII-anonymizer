services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    command: serve
    ports:
      - "18080:18080"     # Coordination server (nginx proxies vpn.maxou.dev:443 → 18080)
      - "3478:3478/udp"   # STUN (embedded DERP server)
    volumes:
      - ./docker/headscale.yaml:/etc/headscale/config.yaml:ro
      - ./data/headscale:/var/lib/headscale
    networks:
      - vpn

  tailscale:
    build:
      context: .
      dockerfile: docker/tailscale.dockerfile
    container_name: tailscale-exit
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data/tailscale:/var/lib/tailscale
    environment:
      - MITM_PROXY_PORT=8080
      - HEADSCALE_URL=${HEADSCALE_URL:-https://vpn.maxou.dev}
      - TS_HOSTNAME=${TS_HOSTNAME:-tailscale-exit}
      - TS_AUTHKEY=${TS_AUTHKEY:-}   # set by headscale-setup.sh in .env
    # Expose mitmproxy's ports through this container (shared network namespace)
    ports:
      - "8080:8080"
      - "8000:8000"
    networks:
      - proxy

  mitm-proxy:
    build:
      context: .
      dockerfile: docker/proxy.dockerfile
    image: claude-mitm-proxy:latest
    container_name: claude-mitm-proxy
    restart: unless-stopped
    # Share tailscale's network namespace so SO_ORIGINAL_DST can see DNAT conntrack entries.
    # Ports and network are defined on the tailscale service above.
    network_mode: "service:tailscale"
    # Dual-mode: transparent proxy on 8080 (VPN traffic via tailscale DNAT) +
    #            reverse proxy on 8000 (MCP server traffic, deanon/anon)
    command: >
      poetry run mitmdump
      -s proxy/main.py
      --mode transparent@0.0.0.0:8080
      --mode reverse:http://mcp-servers:8000@0.0.0.0:8000
      --set console_eventlog_verbosity=info
      --set flow_detail=0
      --set script_reload=false
#      - "127.0.0.1:9999:9999" # use `docker compose exec poetry run python console.py` instead !
    volumes:
      # Persists mitmproxy CA cert across restarts.
      # The cert at ./data/mitmproxy-ca-cert.pem must be installed on every
      # client machine that routes traffic through this proxy.
      # === CRITICAL: Mount host caches to avoid re-downloading dependencies ===
      # pip cache (wheels, build artifacts) — shared between host and container
      - ~/.cache/pip:/root/.cache/pip:delegated
      # poetry cache — shared between host and container
      - ~/.cache/pypoetry:/root/.cache/pypoetry:delegated
      # HuggingFace models — shared between host and container
      - ~/.cache/huggingface:/root/.cache/huggingface:delegated
      # EasyOCR models — shared between host and container
      - ~/.EasyOCR:/root/.EasyOCR:delegated

      # === Application data ===
      # Persists mitmproxy CA cert across restarts.
      - ./data/mitmproxy:/root/.mitmproxy
      # Runtime config — edit without rebuilding
      - ./assets:/app/assets:ro
      # Persistent cache and audit log
      - ./data/cache:/app/cache
      - ./data/ignore:/app/ignore
      # Mount source code so code changes take effect without rebuilding the image
      - ./proxy:/app/proxy
      # All /app/data output (redacted images, request log, …)
      - ./data:/app/data
      # Fine-tuned NER models
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.
    depends_on:
      - tailscale
      - google-workspace-mcp

      #  validator:
      #    build:
      #      context: .
      #      dockerfile: docker/validator.dockerfile
      #      args:
      #        HF_TOKEN: ${HF_TOKEN}
      #    container_name: claude-validator
      #    restart: unless-stopped
      # Validator runs as a scheduled service inside the container
      # No host cron — everything is containerized
      #    command: poetry run python validator/main.py --daemon
      #    volumes:
      # === CRITICAL: Mount host caches to avoid re-downloading dependencies ===
