services:

  # ── VPN exit nodes ────────────────────────────────────────────────────────

  headscale:
    profiles: [tailscale, tailscale-explicit]
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    command: serve
    ports:
      - "18080:18080"     # Coordination server (nginx proxies vpn.maxou.dev:443 → 18080)
      - "3478:3478/udp"   # STUN (embedded DERP server)
    volumes:
      - ./docker/headscale.yaml:/etc/headscale/config.yaml:ro
      - ./data/headscale:/var/lib/headscale
    networks:
      - vpn

  tailscale:
    profiles: [tailscale, tailscale-explicit]
    build:
      context: .
      dockerfile: docker/tailscale.dockerfile
    container_name: tailscale-exit
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.route_localnet=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data/tailscale:/var/lib/tailscale
    environment:
      - MITM_PROXY_PORT=8080
      - HEADSCALE_URL=${HEADSCALE_URL:-https://vpn.maxou.dev}
      - TS_HOSTNAME=${TS_HOSTNAME:-tailscale-exit}
      - TS_AUTHKEY=${TS_AUTHKEY:-}
    ports:
      - "8080:8080"
      - "8000:8000"
      - "41641:41641/udp"
    networks:
      - proxy

  wireguard:
    profiles: [wireguard, wireguard-explicit]
    build:
      context: .
      dockerfile: docker/wireguard.dockerfile
    container_name: wireguard-exit
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.route_localnet=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data/wireguard/wg0.conf:/etc/wireguard/wg0.conf:ro
    environment:
      - MITM_PROXY_PORT=8080
    ports:
      - "8080:8080"
      - "8000:8000"
    networks:
      - proxy

  # ── Proxy instances ───────────────────────────────────────────────────────

  mitm-proxy:
    profiles: [tailscale, wireguard]
    build:
      context: .
      dockerfile: docker/proxy.dockerfile
    image: claude-mitm-proxy:latest
    container_name: claude-mitm-proxy
    restart: unless-stopped
    depends_on:
      tailscale:
        condition: service_started
        required: false
      wireguard:
        condition: service_started
        required: false
    # Share the VPN container's network namespace so SO_ORIGINAL_DST sees DNAT conntrack entries.
    # Overridden per profile via COMPOSE_PROFILES — only one VPN container is active at a time.
    network_mode: ${MITM_NETWORK_MODE:-service:wireguard}
    command: >
      poetry run mitmdump
      -s proxy/main.py
      --mode transparent@0.0.0.0:8080
      --mode reverse:http://mcp-servers:8000@0.0.0.0:8000
      --set console_eventlog_verbosity=info
      --set flow_detail=0
      --set script_reload=false
    volumes:
      - ~/.cache/pip:/root/.cache/pip:delegated
      - ~/.cache/pypoetry:/root/.cache/pypoetry:delegated
      - ~/.cache/huggingface:/root/.cache/huggingface:delegated
      - ~/.EasyOCR:/root/.EasyOCR:delegated
      - ./data/mitmproxy:/root/.mitmproxy
      - ./assets:/app/assets:ro
      - ./data/cache:/app/cache
      - ./data/ignore:/app/ignore
      - ./proxy:/app/proxy
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.

  mitm-proxy-explicit:
    profiles: [tailscale-explicit, wireguard-explicit, simple-explicit]
    build:
      context: .
      dockerfile: docker/proxy.dockerfile
    image: claude-mitm-proxy:latest
    container_name: claude-mitm-proxy-explicit
    restart: unless-stopped
    depends_on:
      tailscale:
        condition: service_started
        required: false
      wireguard:
        condition: service_started
        required: false
    command: >
      poetry run mitmdump
      -s proxy/main.py
      --mode regular@0.0.0.0:8080
      --mode reverse:http://mcp-servers:8000@0.0.0.0:8000
      --set console_eventlog_verbosity=info
      --set flow_detail=0
      --set script_reload=false
    volumes:
      - ~/.cache/pip:/root/.cache/pip:delegated
      - ~/.cache/pypoetry:/root/.cache/pypoetry:delegated
      - ~/.cache/huggingface:/root/.cache/huggingface:delegated
      - ~/.EasyOCR:/root/.EasyOCR:delegated
      - ./data/mitmproxy:/root/.mitmproxy
      - ./assets:/app/assets:ro
      - ./data/cache:/app/cache
      - ./data/ignore:/app/ignore
      - ./proxy:/app/proxy
      - ./data:/app/data
      - ./models:/app/models
    ports:
      - "8080:8080"
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.

  # ── MCP servers ───────────────────────────────────────────────────────────

  mcp-servers:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - ./mcp.conf:/etc/nginx/conf.d/mcp.conf
    networks:
      - mcp
      - proxy

  google-workspace-mcp:
    build:
      context: .
      dockerfile: docker/gw-mcp.dockerfile
    image: claude-pii-proxy-google-workspace-mcp:latest
    container_name: google-workspace-mcp
    restart: unless-stopped
    networks:
      - mcp
    volumes:
      - ./data/google-workspace-mcp:/app/tokens
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=https://mcp.maxou.dev/google/oauth2callback
      - OAUTHLIB_INSECURE_TRANSPORT=1
      - PYTHONUNBUFFERED=1


networks:
  mcp:
    driver: bridge
  proxy:
    driver: bridge
  vpn:
    driver: bridge
