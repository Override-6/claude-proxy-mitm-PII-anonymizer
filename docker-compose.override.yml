# Local development overrides — enables BuildKit for faster builds with proper caching
version: '3.8'

# Enable BuildKit for all builds (persistent cache, proper layer reuse)
# Set DOCKER_BUILDKIT=1 in your shell, or Docker will use this:
services:
  mitm-proxy:
    build:
      context: .
      dockerfile: docker/proxy.dockerfile
      # BuildKit automatically uses host cache if enabled

  validator:
    build:
      context: .
      dockerfile: docker/validator.dockerfile
      # BuildKit automatically uses host cache if enabled
